<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>新人報到飲食調查 — PayEasy × 17Life</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #EEF6FF;
    --blue-mid:   #4DAEE8;
    --blue-dark:  #2196C9;
    --blue-deep:  #1278A0;
    --amber-light:#FFF4E0;
    --amber-dark: #E07800;
    --green-light:#EDFAEF;
    --green-mid:  #2AAD4E;
    --green-dark: #1A7D36;
    --red:        #F0425A;
    --border:     rgba(0,0,0,0.10);
    --border-hover: rgba(0,0,0,0.22);
    --text-primary:   #1a1a1a;
    --text-secondary: #666;
    --bg: #FDF8FF;
    --surface: #FFFFFF;
    --radius-md: 10px;
    --radius-lg: 16px;
    --pink:      #F0427A;
    --orange:    #FF7A2F;
    --yellow:    #FFB800;
    --purple:    #9B59D0;
    --teal:      #00B8A0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #FFF0F5 0%, #F0F8FF 50%, #F5FFF0 100%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .card {
    max-width: 580px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 2rem 2rem 2.5rem;
  }

  /* ── Header ── */
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-pe  { background: linear-gradient(90deg,#FFE0EC,#FFE8D0); color: #C0304A; }
  .badge-17l { background: linear-gradient(90deg,#E8D8FF,#D0EEFF); color: #6030A0; }
  .divx { font-size: 13px; color: var(--text-secondary); }

  .survey-title { font-size: 20px; font-weight: 600; line-height: 1.4; }
  .survey-sub   { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* ── Section ── */
  hr.sep { border: none; border-top: 0.5px solid var(--border); margin: 1.75rem 0; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text-secondary); margin-bottom: 1rem;
  }

  /* ── Field ── */
  .field { margin-bottom: 1.375rem; }
  .field-label {
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
  }
  .req { width: 5px; height: 5px; border-radius: 50%; background: var(--red); display: inline-block; }

  input[type="text"], textarea {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    background: var(--surface); color: var(--text-primary);
    font-family: inherit; transition: border-color .15s, box-shadow .15s;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none; border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(240,66,122,.13);
  }
  textarea { resize: vertical; min-height: 72px; }
  .hint { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

  /* ── Radio cards ── */
  .radio-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .radio-card {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 13px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    cursor: pointer; transition: border-color .15s, background .15s;
    background: var(--surface);
  }
  .radio-card:has(input:checked) {
    border-color: var(--pink); background: #FFF0F5;
  }
  .radio-card input { accent-color: var(--pink); width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; }
  .rc-main { font-size: 14px; }
  .rc-sub  { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  /* ── Checkbox list ── */
  .check-list { display: flex; flex-direction: column; gap: 6px; }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer; background: var(--surface); transition: border-color .15s, background .15s;
  }
  .check-item:has(input:checked) {
    border-color: var(--pink); background: #FFF0F5;
  }
  .check-item input { accent-color: var(--pink); width: 15px; height: 15px; flex-shrink: 0; }
  .check-item span  { font-size: 14px; }
  #other-wrap { display: none; margin-top: 8px; }

  /* ── Submit ── */
  .submit-btn {
    width: 100%; padding: 12px; font-size: 15px; font-weight: 700;
    background: linear-gradient(90deg, #F0427A 0%, #FF7A2F 50%, #FFB800 100%);
    color: #fff; border: none;
    border-radius: var(--radius-md); cursor: pointer;
    transition: opacity .15s; margin-top: 0.5rem;
    letter-spacing: 0.04em;
  }
  .submit-btn:hover   { opacity: 0.88; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; opacity: 1; }

  /* ── Success ── */
  #success {
    display: none; background: var(--green-light);
    border: 0.5px solid #C0DD97; border-radius: var(--radius-lg);
    padding: 2.5rem 1.5rem; text-align: center;
  }
  .success-icon { font-size: 40px; margin-bottom: 12px; }
  .success-title { font-size: 18px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; }
  .success-sub   { font-size: 13px; color: var(--green-mid); }

  /* ── Error banner ── */
  #error-banner {
    display: none; background: #FCEBEB; border: 0.5px solid #F09595;
    border-radius: var(--radius-md); padding: 10px 14px;
    font-size: 13px; color: #A32D2D; margin-top: 12px;
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem 1.25rem 2rem; }
    .radio-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  <div id="form-body">

    <div class="section-label">基本資料</div>

    <div class="field">
      <div class="field-label"><span class="req"></span> 姓名</div>
      <input type="text" id="name" placeholder="請輸入真實姓名" />
    </div>

    <div class="field">
      <div class="field-label"><span class="req"></span> 報到公司</div>
      <div class="radio-grid">
        <label class="radio-card">
          <input type="radio" name="company" value="17life" />
          <div><div class="rc-main">17Life 康太數位</div></div>
        </label>
        <label class="radio-card">
          <input type="radio" name="company" value="payeasy" />
          <div><div class="rc-main">PayEasy 康迅數位</div></div>
        </label>
      </div>
    </div>

    <hr class="sep" />
    <div class="section-label">飲食習慣</div>

    <div class="field">
      <div class="field-label"><span class="req"></span> 飲食類型</div>
      <div class="radio-grid">
        <label class="radio-card">
          <input type="radio" name="diet" value="omnivore" />
          <div><div class="rc-main">葷食</div><div class="rc-sub">無特殊限制</div></div>
        </label>
        <label class="radio-card">
          <input type="radio" name="diet" value="vegetarian" />
          <div><div class="rc-main">蛋奶素</div><div class="rc-sub">可食蛋、奶製品</div></div>
        </label>
        <label class="radio-card">
          <input type="radio" name="diet" value="vegan" />
          <div><div class="rc-main">純素</div><div class="rc-sub">全植物性飲食</div></div>
        </label>

      </div>
    </div>

    <div class="field">
      <div class="field-label">不吃的食材（可多選）</div>
      <div class="check-list">
        <label class="check-item"><input type="checkbox" value="無" id="none-chk" /><span>無（無特殊禁忌）</span></label>
        <label class="check-item"><input type="checkbox" value="牛肉"  /><span>牛肉</span></label>
        <label class="check-item"><input type="checkbox" value="豬肉"  /><span>豬肉</span></label>
        <label class="check-item"><input type="checkbox" value="海鮮／魚類" /><span>海鮮 / 魚類</span></label>
        <label class="check-item"><input type="checkbox" value="雞肉"  /><span>雞肉</span></label>
        <label class="check-item"><input type="checkbox" value="堅果類" /><span>堅果類</span></label>
        <label class="check-item"><input type="checkbox" value="乳製品" /><span>乳製品</span></label>
        <label class="check-item"><input type="checkbox" value="蛋類"  /><span>蛋類</span></label>
        <label class="check-item" id="other-label">
          <input type="checkbox" id="other-chk" value="other" /><span>其他</span>
        </label>
      </div>
      <div id="other-wrap">
        <input type="text" id="other-text" placeholder="請說明其他不吃的食材或過敏原" />
      </div>
    </div>

    <div class="field">

  // ★ 請將下方 SCRIPT_URL 換成你的 Google Apps Script 部署網址
  // ============================================================
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx19uT7k3lhE33nZRmP0OkanjvIHeHH8JRdF31ZKSFr5rH5aCwi_WL5q2Ckt-WsklZf7w/exec";

  document.getElementById("other-chk").addEventListener("change", function () {
    document.getElementById("other-wrap").style.display = this.checked ? "block" : "none";
    if (this.checked) document.getElementById("none-chk").checked = false;
  });

  document.getElementById("none-chk").addEventListener("change", function () {
    if (this.checked) {
      document.querySelectorAll('.check-list input[type="checkbox"]').forEach(cb => {
        if (cb.id !== "none-chk") { cb.checked = false; }
      });
      document.getElementById("other-wrap").style.display = "none";
    }
  });

  document.querySelectorAll('.check-list input[type="checkbox"]').forEach(cb => {
    if (cb.id !== "none-chk") {
      cb.addEventListener("change", function () {
        if (this.checked) document.getElementById("none-chk").checked = false;
      });
    }
  });

  async function submitForm() {
    const name    = document.getElementById("name").value.trim();
    const company = document.querySelector('input[name="company"]:checked');
    const diet    = document.querySelector('input[name="diet"]:checked');

    // 驗證必填
    if (!name)    { showError("請填寫姓名"); return; }
    if (!company) { showError("請選擇報到公司"); return; }
    if (!diet)    { showError("請選擇飲食類型"); return; }

    // 收集多選食材
    const avoidances = Array.from(
      document.querySelectorAll('.check-list input[type="checkbox"]:checked')
    )
    .filter(cb => cb.value !== "other")
    .map(cb => cb.value);

    const payload = {
      name,
      company:      company.value,
      diet:         diet.value,
      avoidances,
      otherAllergy: document.getElementById("other-text").value.trim(),
      notes:        document.getElementById("notes").value.trim(),
    };

    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "送出中…";
    hideError();

    try {
      await fetch(SCRIPT_URL, {
        method:  "POST",
        body:    JSON.stringify(payload),
        // Apps Script 不需 Content-Type header（no-cors 模式）
        mode:    "no-cors",
      });

      // no-cors 下無法讀取 response，直接視為成功
      document.getElementById("form-body").style.display = "none";
      document.getElementById("success").style.display   = "block";

    } catch (err) {
      btn.disabled = false;
      btn.textContent = "送出回覆";
      showError("送出失敗，請確認網路連線後重試。（" + err.message + "）");
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-banner");
    el.textContent = msg;
    el.style.display = "block";
  }
  function hideError() {
    document.getElementById("error-banner").style.display = "none";
  }
</script>
</body>
</html>
